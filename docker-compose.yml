name: feishu-workload-tracker

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时需要的环境变量（从 .env 文件读取）
        - FEISHU_APP_ID=${FEISHU_APP_ID}
        - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
        - FEISHU_APP_TOKEN=${FEISHU_APP_TOKEN}
        - FEISHU_TABLE_ID=${FEISHU_TABLE_ID}
        - FEISHU_DEPARTMENT_ID=${FEISHU_DEPARTMENT_ID}
        - SESSION_SECRET=${SESSION_SECRET}
        - NEXTAUTH_URL=${NEXTAUTH_URL}
        - FEISHU_REDIRECT_URI=${FEISHU_REDIRECT_URI}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "node -e 'require(\"http\").get(\"http://localhost:3000/\", (res) => {process.exit(res.statusCode === 200 ? 0 : 1)})'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
